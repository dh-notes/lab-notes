<header class="border-b border-ink bg-paper px-6 py-2 md:mx-6">
  <div class="flex flex-wrap items-center justify-between gap-x-6 gap-y-1 md:gap-y-3">
    <a href="{{ '/' | relative_url }}" class="shrink-0 font-sans text-3xl font-semibold tracking-tight">
        Lab<span class="text-red">/</span>Notes <span class="text-red font-normal font-mono"> [draft] <span>
    </a>

    <nav class="min-w-0" aria-label="Primary">
      <div class="flex flex-wrap items-center gap-x-4 gap-y-2 font-mono text-lg uppercase tracking-[0.12em]">
        <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}text-ink underline underline-offset-[0.22rem] decoration-[1px]{% else %}text-grey hover:text-ink{% endif %}"
          {% if page.url == '/' %}aria-current="page"{% endif %}>
          Home
        </a>

        {% for menuItem in site.data.navbar %}
          {% assign href = menuItem.path | relative_url %}
          <a href="{{ href }}" class="{% if page.url == menuItem.path %}text-ink underline underline-offset-[0.22rem] decoration-[1px]{% else %}text-grey hover:text-ink{% endif %}"
            {% if page.url == menuItem.path %}aria-current="page"{% endif %}>
            {{ menuItem.name }}
          </a>
        {% endfor %}
      </div>
    </nav>
  </div>

  <!-- hide in mobile -->
  <div class="font-mono text-sm leading-[1.75] text-grey hidden md:block">
    A peer-reviewed journal on research design and method.
  </div>
</header>
