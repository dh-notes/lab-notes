<header class="masthead">
  <div class="m-logo">
    <a href="{{ '/' | relative_url }}">Lab<span class="slash">/</span>Notes</a>
  </div>
  <div class="m-title">Journal of Methodological Reflection</div>
  <div class="m-vol">Lab-based research in the humanities and social sciences</div>
</header>

<nav class="section-nav" aria-label="Primary">
  <div class="section-nav-inner">
    <a href="{{ '/' | relative_url }}" class="section-link{% if page.url == '/' %} is-current{% endif %}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>

    {% for menuItem in site.data.navbar %}
      {% assign href = menuItem.path | relative_url %}
      <a href="{{ href }}" class="section-link{% if page.url == menuItem.path %} is-current{% endif %}" {% if page.url == menuItem.path %}aria-current="page"{% endif %}>
        {{ menuItem.name }}
      </a>
    {% endfor %}
  </div>
</nav>
