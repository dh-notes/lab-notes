<header class="bg-stone-50 px-6 py-2">

    <div class="flex items-end gap-1 md:items-baseline md:justify-between">
        <div>
            <a href="{{ '/' | relative_url }}" class="text-3xl font-semibold tracking-tight shrink-0">
                Lab<span class="text-red-500">/</span>Notes
            </a>
        </div>

        <nav class="min-w-0" aria-label="Primary">
            <div class="flex flex-wrap gap-x-4 md:gap-x-6 gap-y-3 px-6 font-mono text-sm uppercase tracking-[0.12em] ">
                <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}text-black underline underline-offset-[0.22rem] decoration-[1px]{% else %}text-gray-500 hover:text-black{% endif %}"
                  {% if page.url == '/' %}aria-current="page"{% endif %}>
                  Home</a>

            {% for menuItem in site.data.navbar %}
              {% assign href = menuItem.path | relative_url %}
              <a href="{{ href }}" class="{% if page.url == menuItem.path %}text-black underline underline-offset-[0.22rem] decoration-[1px]{% else %}text-gray-500 hover:text-black{% endif %}"
                {% if page.url == menuItem.path %}aria-current="page"{% endif %}>
                {{ menuItem.name }}
              </a>
            {% endfor %}
          </div>
        </nav>

    </div>

    <div class="text-gray-500 font-mono text-xs leading-[1.75]">
        A peer-reviewed journal on research design and method.
    </div>

</header>
