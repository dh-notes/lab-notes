{% assign text = include.text %}
{% assign href = include.href %}

{% if href %}
  <a href="{{ href | relative_url }}"
     class="font-mono text-[0.88rem] uppercase tracking-[0.12em] text-ink/70 hover:text-red">
    {{ text }}
  </a>
{% else %}
  <span class="font-mono text-[0.88rem] uppercase tracking-[0.12em] text-ink/70">
    {{ text }}
  </span>
{% endif %}
