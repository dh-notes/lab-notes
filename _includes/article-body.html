<div class="grid grid-cols-1 md:grid-cols-[minmax(0,1fr)_280px]">

  <!-- body (main column) -->
  <div class="px-4 py-10 md:px-6 md:py-12 md:border-r md:border-ink/10
              prose prose-neutral max-w-none
              prose-p:font-mono prose-p:text-[0.82rem] prose-p:leading-[1.9]
              prose-li:font-mono prose-li:text-[0.82rem] prose-li:leading-[1.9]
              prose-headings:font-sans prose-headings:font-black prose-headings:uppercase
              prose-headings:tracking-[-0.02em] prose-headings:text-ink
              prose-h2:text-[1.4rem] prose-h2:mt-10 prose-h2:mb-4
              prose-a:text-ink prose-a:border-b prose-a:border-ink/30 prose-a:no-underline
              hover:prose-a:text-red hover:prose-a:border-red
              prose-em:italic prose-strong:font-bold">
    {{ content }}
  </div>

  <!-- right column (empty; notes live in the apparatus below the dark border) -->
  <aside class="hidden md:block bg-paper"></aside>

</div>
