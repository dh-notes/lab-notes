<header class="grid md:grid-cols-2">

  <!-- main -->
  <div class="px-4 py-6 md:px-6 md:py-7">
    <span class="mb-3 block font-mono text-xs uppercase tracking-wider text-red-600">
        {{ page.kicker }}
    </span>

    <h1 class="font-sans text-4xl font-black uppercase leading-tight md:text-6xl">
        {{ page.title }}
    </h1>
  </div>

  <!-- meta -->
  <div class="bg-stone-100 px-4 py-6 font-mono text-sm leading-relaxed text-gray-500 md:px-6">
    {{ page.meta }}
  </div>

</header>
