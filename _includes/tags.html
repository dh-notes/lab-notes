{% assign tags = include.items %}

{% if tags and tags != empty %}

    <div class="mt-2 flex flex-wrap gap-x-3 gap-y-1">
      {% for tag in tags %}
        <span class="font-mono text-[0.66rem] uppercase tracking-[0.08em] text-red">
          {{ tag }}
        </span>
      {% endfor %}
    </div>

{% endif %}
