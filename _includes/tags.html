{% assign tags = include.items %}

{% if tags and tags != empty %}

    <div class="mt-2 flex flex-wrap gap-2">
      {% for tag in tags %}
        <span class="border border-gray-300 px-2 py-[3px] font-mono text-[0.66rem] uppercase tracking-[0.08em]">
          {{ tag }}
        </span>
      {% endfor %}
    </div>

{% endif %}
