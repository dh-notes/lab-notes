url: "https://labnotesjournal.org"
baseurl: ""
title: "Lab Notes"
description: "A peer-reviewed journal of methodological reflection on research design and method in the humanities and social sciences."
tagline: "A peer-reviewed journal on research design and method."
journal_abbrev: "Lab Notes"

plugins:
  - jekyll-sitemap

markdown: kramdown
kramdown:
  footnote_nr: 1

exclude:
  - package.json
  - postcss.config.js
  - yarn.lock
  - package-lock.json
  - node_modules
  - README.md
  - .jekyll-cache/
  - _site/

include: ["_pages"]

collections_dir: collections

collections:
  notes:
    output: true
    permalink: /notes/:path/

defaults:
  - scope:
      path: "collections/_notes"
      type: "notes"
    values:
      layout: note
